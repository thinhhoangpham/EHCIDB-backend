services:
  mysql:
    image: mysql:8
    container_name: ehci-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  fastapi:
    build: .
    container_name: ehci-apifile
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - mysql

volumes:
  mysql_data: