services:
  db:
    image: mysql:8.4
    container_name: ehcidb_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pw
      MYSQL_DATABASE: ehcidb
      MYSQL_USER: ehci
      MYSQL_PASSWORD: ehci_pw
    ports:
      - "3307:3306"
    command: --local-infile=1 --secure-file-priv=""
    volumes:
      - mysqldata:/var/lib/mysql
      - ./DATA:/data
      - ./SQL:/docker-entrypoint-initdb.d

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ehcidb_api
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ehcidb
      DB_USER: ehci
      DB_PASSWORD: ehci_pw
      SECRET_KEY: dev-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  mysqldata:
